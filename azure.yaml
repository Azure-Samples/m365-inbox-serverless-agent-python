# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: m365-inbox-agent-functions-python
metadata:
  template: m365-inbox-agent-functions-python@1.0.0
services:
  api:
    project: ./
    host: function
    language: python
    hooks:
      prepackage:
        posix:
          shell: sh
          run: uv export --format requirements-txt --no-hashes --no-dev --no-emit-project > requirements.txt
          continueOnError: false
        windows:
          shell: pwsh
          run: uv export --format requirements-txt --no-hashes --no-dev --no-emit-project | Set-Content -Path requirements.txt -Encoding utf8
          continueOnError: false
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./infra/scripts/setuplocalenvironment.sh
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/setuplocalenvironment.ps1
      interactive: true
      continueOnError: false
  postdeploy:
    posix:
      shell: sh
      run: ./infra/scripts/configure-trigger.sh
      interactive: true
      continueOnError: false
    windows:
      shell: pwsh
      run: ./infra/scripts/configure-trigger.ps1
      interactive: true
      continueOnError: false
